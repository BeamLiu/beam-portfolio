<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#0A0E27"/>
  
  <!-- AI Brain/Circuit pattern -->
  <g stroke="#00D9FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Central node -->
    <circle cx="32" cy="32" r="4" fill="#00D9FF"/>
    
    <!-- Neural network connections -->
    <line x1="32" y1="28" x2="32" y2="18"/>
    <circle cx="32" cy="18" r="3" fill="#00D9FF"/>
    
    <line x1="32" y1="36" x2="32" y2="46"/>
    <circle cx="32" cy="46" r="3" fill="#00D9FF"/>
    
    <line x1="28" y1="32" x2="18" y2="32"/>
    <circle cx="18" cy="32" r="3" fill="#00D9FF"/>
    
    <line x1="36" y1="32" x2="46" y2="32"/>
    <circle cx="46" cy="32" r="3" fill="#00D9FF"/>
    
    <!-- Diagonal connections -->
    <line x1="28" y1="28" x2="22" y2="22"/>
    <circle cx="22" cy="22" r="2.5" fill="#00D9FF"/>
    
    <line x1="36" y1="28" x2="42" y2="22"/>
    <circle cx="42" cy="22" r="2.5" fill="#00D9FF"/>
    
    <line x1="28" y1="36" x2="22" y2="42"/>
    <circle cx="22" cy="42" r="2.5" fill="#00D9FF"/>
    
    <line x1="36" y1="36" x2="42" y2="42"/>
    <circle cx="42" cy="42" r="2.5" fill="#00D9FF"/>
  </g>
  
  <!-- Industrial gear accent -->
  <g stroke="#00D9FF" stroke-width="1.5" fill="none" opacity="0.6">
    <circle cx="48" cy="16" r="6"/>
    <line x1="48" y1="10" x2="48" y2="12"/>
    <line x1="48" y1="20" x2="48" y2="22"/>
    <line x1="42" y1="16" x2="44" y2="16"/>
    <line x1="52" y1="16" x2="54" y2="16"/>
  </g>
  
  <!-- Letter B accent -->
  <text x="14" y="54" font-family="monospace" font-size="16" font-weight="bold" fill="#00D9FF" opacity="0.8">B</text>
</svg>
