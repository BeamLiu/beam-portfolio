<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0A0E27"/>
  
  <!-- AI Neural network icon -->
  <g stroke="#00D9FF" stroke-width="1.5" stroke-linecap="round">
    <!-- Central node -->
    <circle cx="16" cy="16" r="2.5" fill="#00D9FF"/>
    
    <!-- Connections -->
    <line x1="16" y1="13.5" x2="16" y2="8"/>
    <circle cx="16" cy="8" r="1.5" fill="#00D9FF"/>
    
    <line x1="16" y1="18.5" x2="16" y2="24"/>
    <circle cx="16" cy="24" r="1.5" fill="#00D9FF"/>
    
    <line x1="13.5" y1="16" x2="8" y2="16"/>
    <circle cx="8" cy="16" r="1.5" fill="#00D9FF"/>
    
    <line x1="18.5" y1="16" x2="24" y2="16"/>
    <circle cx="24" cy="16" r="1.5" fill="#00D9FF"/>
    
    <!-- Diagonal nodes -->
    <line x1="14" y1="14" x2="10" y2="10"/>
    <circle cx="10" cy="10" r="1.2" fill="#00D9FF"/>
    
    <line x1="18" y1="14" x2="22" y2="10"/>
    <circle cx="22" cy="10" r="1.2" fill="#00D9FF"/>
    
    <line x1="14" y1="18" x2="10" y2="22"/>
    <circle cx="10" cy="22" r="1.2" fill="#00D9FF"/>
    
    <line x1="18" y1="18" x2="22" y2="22"/>
    <circle cx="22" cy="22" r="1.2" fill="#00D9FF"/>
  </g>
</svg>
